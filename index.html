<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon Team Builder</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #9fc3cf;
    text-align: center;
}

.container {
    background: white;
    width: 600px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 25px;
    border: 6px solid goldenrod;
}

img {
    width: 200px;
    height: 200px;
}

select {
    width: 200px;
    margin: 5px;
}

button {
    margin-top: 10px;
    padding: 6px 12px;
}

.team {
    margin-top: 20px;
    border-top: 2px solid black;
    padding-top: 10px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">
    <h2>Name or ID</h2>
    <input type="text" id="pokemonInput">
    <button onclick="findPokemon()">Find</button>

    <div id="pokemonDisplay">
        <img id="pokemonImage" src="" alt="">
        <br><br>
        <audio id="pokemonCry" controls></audio>
        <br><br>

        <div>
            <select id="move1"></select>
            <select id="move2"></select><br>
            <select id="move3"></select>
            <select id="move4"></select>
        </div>

        <button onclick="addToTeam()">Add to Team</button>
    </div>

    <div class="team" id="teamSection">
        <h3>Team</h3>
    </div>
</div>

<script>
const cache = {}; // local cache object
let currentPokemon = null;

async function findPokemon() {
    const input = document.getElementById("pokemonInput").value.toLowerCase().trim();
    if (!input) return;

    if (cache[input]) {
        loadPokemon(cache[input]);
        return;
    }

    try {
        const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${input}`);
        if (!response.ok) throw new Error("Pokemon not found");

        const data = await response.json();
        cache[input] = data; // cache response
        loadPokemon(data);

    } catch (error) {
        alert("Pokemon not found.");
    }
}

function loadPokemon(data) {
    currentPokemon = data;

    document.getElementById("pokemonImage").src =
        data.sprites.front_default;

    document.getElementById("pokemonCry").src =
        data.cries?.latest || "";

    const selects = ["move1", "move2", "move3", "move4"];
    const moves = data.moves.map(m => m.move.name);

    selects.forEach(id => {
        const dropdown = document.getElementById(id);
        dropdown.innerHTML = "";

        moves.slice(0, 50).forEach(move => {
            const option = document.createElement("option");
            option.value = move;
            option.textContent = move;
            dropdown.appendChild(option);
        });
    });
}

function addToTeam() {
    if (!currentPokemon) return;

    const teamSection = document.getElementById("teamSection");

    const container = document.createElement("div");
    container.style.display = "flex";
    container.style.alignItems = "center";
    container.style.borderTop = "1px solid black";
    container.style.padding = "10px 0";

    const img = document.createElement("img");
    img.src = currentPokemon.sprites.front_default;
    img.style.width = "80px";
    img.style.height = "80px";

    const moveList = document.createElement("ul");

    ["move1", "move2", "move3", "move4"].forEach(id => {
        const li = document.createElement("li");
        li.textContent = document.getElementById(id).value;
        moveList.appendChild(li);
    });

    container.appendChild(img);
    container.appendChild(moveList);
    teamSection.appendChild(container);
}
</script>

</body>
</html>
